name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package skills
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for skill_dir in */; do
            skill="${skill_dir%/}"
            zip -r "${skill}-${VERSION}.zip" "$skill_dir"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
